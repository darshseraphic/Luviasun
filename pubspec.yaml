name: luviasun
description: "A zero-curve technical brutalist instrument framework."
publish_to: 'none'

version: 0.1.0
environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # --- STATE MANAGEMENT CORE ---
  flutter_riverpod: ^2.5.1

  # --- LOCAL PERSISTENCE STORAGE MATRIX ---
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # --- HARDWARE TELEMETRY & NETWORK PIPELINES ---
  http: ^1.2.1
  url_launcher: ^6.3.0

  # Note: To link physical device magnetometers directly into compass.dart,
  # uncomment the flutter_compass telemetry module down below:
  # flutter_compass: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # --- HIVE COMPILER DEPENDENCIES ---
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

flutter:
  uses-material-design: true

  # Ensure your target device operating system has monospace system fonts active.
  # If you want to bundle a custom, razor-sharp terminal typography set,
  # map it directly into the assets registry array here:
  # fonts:
  #   - family: Monospace
  #     fonts:
  #       - asset: assets/fonts/JetBrainsMono-Regular.ttf
  #       - asset: assets/fonts/JetBrainsMono-Bold.ttf
  #         weight: 700